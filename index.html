<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة الغالي عموري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; text-align: center; }
        .container { width: 85%; max-width: 400px; padding: 40px 20px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 35px; border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .profile-img { width: 230px; height: 230px; border-radius: 50%; border: 5px solid #d4af37; object-fit: cover; margin-bottom: 25px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.6); }
        h1 { font-size: 34px; font-weight: 900; color: #d4af37; margin-bottom: 10px; }
        .btn { background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); color: #000; border: none; padding: 18px 0; border-radius: 50px; font-weight: bold; font-size: 22px; cursor: pointer; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <img src="data:image/jpeg;base64,[[BASE64_CODE_HERE]]" alt="عموري" class="profile-img">
        
        <h1>كلنا نحب عموري</h1>
        <p>بشبكة أبو عماد.. حياكم الله</p>
        
        <button onclick="checkPassword()" class="btn">دخول السيرفر</button>
    </div>

    <script>
        function checkPassword() {
            var input = prompt("نعم احب عموري");
            if (input === "123" || input === "نعم احب عموري") {
                window.location.href = "http://google.com";
            } else if (input !== null) {
                alert("الرقم غلط.. اطلب السر من أبو عماد");
            }
        }
    </script>
</body>
</html>
