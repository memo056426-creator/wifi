<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد ستارلينك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: #000;
            background-image: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }
        .container {
            width: 85%;
            max-width: 400px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }
        .profile-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid #d4af37;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
        }
        h1 {
            font-size: 36px;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 5px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.8);
        }
        .welcome-msg {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 35px;
        }
        .btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #000;
            border: none;
            padding: 18px 0;
            border-radius: 50px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/memo056426-creator/wifi/main/MVING_20260220_183511.jpg" alt="عموري" class="profile-img">
        
        <h1>كلنا نحب عموري</h1>
        <div class="welcome-msg">بشبكة أبو عماد.. حياكم الله</div>
        
        <button onclick="checkPassword()" class="btn">دخول السيرفر</button>
    </div>

    <script>
        function checkPassword() {
            var password = "123";
            var input = prompt("نعم احب عموري");
            
            if (input === password || input === "نعم احب عموري") {
                window.location.href = "http://google.com";
            } else if (input !== null) {
                alert("الرقم غلط.. اطلب السر من أبو عماد");
            }
        }
    </script>

</body>
</html>
