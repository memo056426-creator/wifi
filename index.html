<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      text-align: center;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>أدخل كلمة المرور</h2>
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="checkPassword()">دخول</button>
    <p id="message" style="color:red;"></p>
  </div>

  <script>
    function checkPassword() {
      var pass = document.getElementById("password").value;
      if(pass === "1234"){ // ضع الكلمة الصحيحة هنا
        window.location.href = "https://emad-aden-realestate.vercel.app/#home"; 
      } else {
        document.getElementById("message").innerText = "كلمة المرور خاطئة ❌";
      }
    }
  </script>
</body>
</html>
