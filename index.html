<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتب عماد عدن العقاري</title>
    <style>
        body { background: #0f172a; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { border: 2px solid #c5a059; padding: 30px; margin: 20px; border-radius: 20px; }
        input { padding: 15px; width: 80%; margin: 20px 0; border-radius: 10px; border: none; font-size: 20px; text-align: center; }
        button { padding: 15px 40px; background: #c5a059; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>مكتب عماد عدن العقاري</h2>
        <p>يجب إدخال الرمز لفتح الإنترنت</p>
        <input type="password" id="p" placeholder="الرمز السري (123)">
        <button onclick="go()">تفعيل الآن</button>
    </div>
    <script>
        // أول ما تفتح الصفحة يطلع تنبيه يحبس المتصفح
        alert("أهلاً بك في شبكة مكتب عماد عدن.. اضغط موافق لإدخال الرمز");

        function go() {
            if(document.getElementById('p').value === "123") {
                alert("كفو! تم تفعيل النت");
                window.location.href = "http://connectivitycheck.gstatic.com/generate_204";
            } else { alert("الرمز غلط!"); }
        }
    </script>
</body>
</html>
