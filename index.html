<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد الملكية</title>
    <style>
        :root { --primary-color: #00d4ff; --bg-dark: #0a0a0b; --card-bg: rgba(255, 255, 255, 0.05); }
        body { text-align: center; font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 20px; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); margin-bottom: 20px; }
        h1 { font-size: 26px; color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { font-size: 16px; opacity: 0.8; margin-bottom: 20px; }
        
        /* صندوق العداد */
        .speed-gauge-box { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--primary-color); margin: 20px auto; max-width: 400px; }
        .gauge-val { font-size: 60px; font-weight: bold; color: var(--primary-color); }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: 0.1s; }

        /* قسم تسجيل الدخول الثابت */
        .auth-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        input[type="password"] { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; text-align: center; box-sizing: border-box; font-size: 16px; }
        .btn-connect { padding: 15px; background: var(--primary-color); color: black; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-connect:hover { background: #00b8e6; }
        
        .btn-measure { padding: 12px 30px; background: none; color: var(--primary-color); border: 2px solid var(--primary-color); border-radius: 50px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>
    <img src="MVIMG_20260220_183511.jpg" alt="عموري" class="profile-img">
    
    <h1>شبكة أبو عماد ستارلينك</h1>
    <p class="subtitle">كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>

    <button id="measure-btn" class="btn-measure" onclick="runFakeTest()">قياس السرعة</button>

    <div class="speed-gauge-box">
        <div id="status-text" style="color:#888; font-size:14px;">جودة الإشارة: خارقة (ستارلينك)</div>
        <div class="gauge-val" id="speed-display">118.5</div>
        <div style="color: #aaa; font-weight: bold;">Mbps</div>
        <div class="progress-bar"><div class="progress-fill" id="fill" style="width: 100%;"></div></div>

        <div class="auth-section">
            <input type="password" id="network-pass" placeholder="أدخل الرقم السري">
            <button onclick="login()" class="btn-connect">اتصال الآن</button>
        </div>
    </div>

    <script>
        function runFakeTest() {
            let v = document.getElementById('speed-display'), f = document.getElementById('fill'), st = document.getElementById('status-text'), c = 0;
            st.innerText = "جاري الاتصال بأقمار ستارلينك...";
            f.style.width = '0%';
            let i = setInterval(() => {
                c += 2;
                v.innerText = (Math.random() * (120 - 76) + 76).toFixed(1);
                f.style.width = c + '%';
                if(c >= 100) { clearInterval(i); v.innerText = "118.5"; st.innerText = "جودة الإشارة: خارقة (ستارلينك)"; }
            }, 50);
        }

        function login() {
            let p = document.getElementById('network-pass').value;
            if (p === "123") { // الباسورد من ملفك
                alert("تم الاتصال بنجاح!");
                window.location.href = "http://google.com";
            } else { alert("الرقم السري غلط يا بوب"); }
        }
    </script>
</body>
</html>
