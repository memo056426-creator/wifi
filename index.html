<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد الملكية</title>
    <style>
        :root { --primary-color: #00d4ff; --bg-dark: #0a0a14; --card-bg: rgba(255, 255, 255, 0.03); }
        body { text-align: center; font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 20px; overflow-x: hidden; }
        .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; box-shadow: 0 0 25px rgba(0, 212, 255, 0.4); margin-bottom: 15px; }
        h1 { font-size: 24px; color: var(--primary-color); margin: 0; }
        .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
        
        /* تصميم العداد الدائري */
        .gauge-container { position: relative; width: 280px; height: 200px; margin: 0 auto; }
        svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #222; stroke-width: 12; stroke-linecap: round; }
        .gauge-progress { fill: none; stroke: var(--primary-color); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 0.1s; }
        .needle { fill: #ddd; transform-origin: 100px 100px; transition: transform 0.1s; }
        .speed-digital { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 45px; font-weight: 900; color: white; }
        
        .speed-box { background: var(--card-bg); padding: 20px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.1); max-width: 380px; margin: 0 auto; }
        .btn-measure { padding: 10px 25px; background: none; color: var(--primary-color); border: 1px solid var(--primary-color); border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        
        .auth-fixed { margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        input[type="password"] { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; font-size: 16px; }
        .btn-connect { padding: 15px; background: var(--primary-color); color: black; border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2); }
    </style>
</head>
<body>
    <img src="MVIMG_20260220_183511.jpg" alt="عموري" class="profile-img">
    <h1>شبكة أبو عماد ستارلينك</h1>
    <p class="subtitle">كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>

    <div class="speed-box">
        <button class="btn-measure" onclick="runTest()">قياس السرعة الحالية</button>
        
        <div class="gauge-container">
            <svg viewBox="0 0 200 150">
                <path class="gauge-bg" d="M 40 120 A 75 75 0 1 1 160 120" />
                <path id="progress" class="gauge-progress" d="M 40 120 A 75 75 0 1 1 160 120" />
                <polygon id="needle" class="needle" points="100,95 97,100 100,40 103,100" transform="rotate(-120, 100, 100)" />
                <circle cx="100" cy="100" r="5" fill="#555" />
            </svg>
            <div class="speed-digital" id="speed-num">0.0</div>
            <div style="color:#666; font-size:12px; margin-top:-10px;">Mbps</div>
        </div>

        <div class="auth-fixed">
            <input type="password" id="pass" placeholder="أدخل الرقم السري">
            <button onclick="login()" class="btn-connect">اتصال الآن</button>
        </div>
    </div>

    <script>
        function runTest() {
            let num = document.getElementById('speed-num'),
                prog = document.getElementById('progress'),
                ndl = document.getElementById('needle'),
                c = 0;
            const speeds = [30, 60, 80, 110, 114]; // سرعاتك اللي طلبتها
            
            let interval = setInterval(() => {
                c++;
                let s = speeds[Math.floor(Math.random() * speeds.length)];
                num.innerText = s.toFixed(1);
                
                // حسابات تحريك الإبرة والقوس
                let angle = (s / 120) * 240 - 120;
                let offset = 440 - (s / 120) * 280;
                
                ndl.setAttribute('transform', `rotate(${angle}, 100, 100)`);
                prog.style.strokeDashoffset = offset;

                if(c >= 40) {
                    clearInterval(interval);
                    num.innerText = "114.0";
                    ndl.setAttribute('transform', `rotate(108, 100, 100)`);
                    prog.style.strokeDashoffset = 175;
                }
            }, 80);
        }

        function login() {
            let p = document.getElementById('pass').value;
            if (p === "123") { // الرمز من كودك
                alert("تم الاتصال بنجاح! نورت الشبكة");
                window.location.href = "http://google.com";
            } else { alert("الرقم السري غلط يا وحش"); }
        }
    </script>
</body>
</html>
