<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شبكة أبو عماد</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; width: 350px; }
        .pic { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #00d2ff; margin-bottom: 15px; object-fit: cover; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .card { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        .card:hover { border-color: #00d2ff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #eee; }
        .go { background: #00d2ff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="amoory.jpg" class="pic">
        <h2>نورت شبكة أبو عماد</h2>
        <div class="grid">
            <div class="card">50 Mbps</div>
            <div class="card">100 Mbps</div>
            <div class="card">250 Mbps</div>
            <div class="card">TURBO</div>
        </div>
        <input type="password" placeholder="الرقم السري">
        <button class="go">دخول</button>
    </div>
</body>
</html>
