<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد ستارلينك</title>
    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-dark: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        /* صورة البروفايل */
        .profile-img { 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            border: 4px solid var(--primary-color); 
            object-fit: cover; 
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            margin-bottom: 20px;
        }

        h1 { font-size: 28px; color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }

        /* عنوان اختار سرعتك */
        .section-title {
            font-size: 22px;
            margin: 40px 0 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .section-title::before, .section-title::after {
            content: "";
            height: 2px;
            width: 50px;
            background: var(--primary-color);
            display: inline-block;
        }

        /* تنسيق كروت السرعات التفاعلية */
        .speeds-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .speed-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .speed-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            background: rgba(0, 212, 255, 0.05);
        }

        /* كلاس التحديد عند النقر */
        .speed-card.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .speed-card.active .speed-value, 
        .speed-card.active .speed-unit {
            color: black !important;
        }

        .speed-value {
            font-size: 32px;
            font-weight: 900;
            display: block;
            color: var(--primary-color);
        }

        .speed-unit {
            font-size: 14px;
            font-weight: bold;
            color: #aaa;
        }

        /* زر الدخول */
        .btn-container { margin-top: 40px; }
        .btn { 
            padding: 15px 60px; 
            background: var(--primary-color); 
            color: black; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 20px; 
            border: none; 
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }
        .btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 15px 25px rgba(0, 212, 255, 0.4);
        }

        .starlink-tag { 
            margin-top: 50px; 
            font-size: 13px; 
            color: #444; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <img src="MVIMG_20260220_183511.jpg" alt="عموري" class="profile-img">
    
    <h1>شبكة أبو عماد ستارلينك</h1>
    <p class="subtitle">كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>

    <div class="section-title">اختار سرعتك</div>
    
    <div class="speeds-grid">
        <div class="speed-card" onclick="selectSpeed(this, '30')">
            <span class="speed-value">30</span>
            <span class="speed-unit">Mbps</span>
        </div>
        <div class="speed-card active" onclick="selectSpeed(this, '70')"> <span class="speed-value">70</span>
            <span class="speed-unit">Mbps</span>
        </div>
        <div class="speed-card" onclick="selectSpeed(this, '100')">
            <span class="speed-value">100</span>
            <span class="speed-unit">Mbps</span>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="checkPassword()" class="btn">اتصال الآن</button>
    </div>

    <div class="starlink-tag">Powered by Starlink High Speed</div>

    <script>
        let selectedSpeed = "70"; // القيمة الافتراضية

        function selectSpeed(element, speed) {
            // إزالة التحديد من جميع الكروت
            document.querySelectorAll('.speed-card').forEach(card => {
                card.classList.remove('active');
            });
            // إضافة التحديد للكرت الذي تم النقر عليه
            element.classList.add('active');
            selectedSpeed = speed;
        }

        function checkPassword() {
            var password = "123"; 
            var input = prompt("ادخل الرقم السري لدخول شبكة أبو عماد بقوة " + selectedSpeed + " ميجا:");
            
            if (input === password) {
                alert("تم الاتصال بنجاح بسرعة " + selectedSpeed + " ميجا. استمتع!");
                window.location.href = "http://google.com";
            } else if (input !== null) {
                alert("الرقم غلط يا وحش اطلب السر من أبو عماد");
            }
        }
    </script>
</body>
</html>
