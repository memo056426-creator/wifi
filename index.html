<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد ستارلينك</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            background-color: #0a0a0a; 
            color: white; 
            padding-top: 30px; 
            margin: 0;
        }
        img { 
            width: 220px; 
            height: 220px; 
            border-radius: 50%; 
            border: 5px solid #00d4ff; 
            object-fit: cover; 
            box-shadow: 0 0 20px #00d4ff; 
        }
        h1 { margin-top: 20px; font-size: 26px; color: #00d4ff; }
        p { font-size: 20px; color: #ffffff; font-weight: bold; margin-top: 10px; }

        /* تنسيق قسم السرعات */
        .speeds-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            padding: 0 10px;
        }
        .speed-card {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 15px;
            width: 100px;
            transition: 0.3s;
        }
        .speed-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 212, 255, 0.2);
        }
        .speed-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
            display: block;
        }
        .speed-unit {
            font-size: 14px;
            color: #ccc;
        }

        .btn { 
            display: inline-block; 
            margin-top: 35px; 
            padding: 12px 50px; 
            background: #00d4ff; 
            color: black; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 20px; 
            transition: 0.3s; 
            cursor: pointer; 
            border: none; 
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }
        .btn:hover { background: #008fb3; transform: scale(1.05); }
        .starlink-tag { margin-top: 25px; font-size: 14px; color: #555; font-style: italic; }
    </style>
    <script>
        function checkPassword() {
            var password = "123"; 
            var input = prompt("ادخل الرقم السري لدخول شبكة أبو عماد:");
            if (input === password) {
                window.location.href = "http://google.com";
            } else if (input !== null) {
                alert("الرقم غلط يا وحش اطلب السر من أبو عماد");
            }
        }
    </script>
</head>
<body>

    <img src="MVIMG_20260220_183511.jpg" alt="عموري">
    
    <h1>نورت شبكة أبو عماد (ستارلينك)</h1>
    <p>كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>

    <div class="speeds-container">
        <div class="speed-card">
            <span class="speed-value">30</span>
            <span class="speed-unit">ميجا</span>
        </div>
        <div class="speed-card">
            <span class="speed-value">70</span>
            <span class="speed-unit">ميجا</span>
        </div>
        <div class="speed-card">
            <span class="speed-value">100</span>
            <span class="speed-unit">ميجا</span>
        </div>
    </div>

    <button onclick="checkPassword()" class="btn">دخول للإنترنت</button>

    <div class="starlink-tag">Powered by Starlink High Speed | ابو عماد للاتصالات</div>

</body>
</html>
