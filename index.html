<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتب عماد عدن العقاري</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        #site-container { position: absolute; top: 0; left: 0; width: 100%; height: 80%; border: none; }
        #login-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 20%; background: #c5a059; display: flex; align-items: center; justify-content: space-around; padding: 10px; box-sizing: border-box; }
        input { padding: 12px; border-radius: 8px; border: none; width: 50%; font-size: 16px; text-align: center; }
        button { padding: 12px 20px; background: #0f172a; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <iframe id="site-container" src="https://emad-aden-realestate.vercel.app"></iframe>

    <div id="login-bar">
        <input type="password" id="pass" placeholder="أدخل رمز الدخول (123)" autocomplete="off">
        <button onclick="connect()">اتصال</button>
    </div>

    <script>
        function connect() {
            if (document.getElementById('pass').value === "123") {
                alert("تم التفعيل بنجاح يا بوب");
                window.location.href = "http://google.com"; // إجبار الجوال يفتح النت
            } else { alert("الرمز غلط!"); }
        }
    </script>
</body>
</html>
