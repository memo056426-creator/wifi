<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد ستارلينك</title>
    <style>
        :root { --primary-color: #00d4ff; --bg-dark: #0a0a14; --card-bg: rgba(255, 255, 255, 0.05); }
        body { text-align: center; font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; }
        .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; margin-top: 20px; }
        h1 { font-size: 24px; color: var(--primary-color); margin: 10px 0; }
        .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 5px; }
        .expiry-box { font-size: 14px; color: #ffcc00; margin-bottom: 20px; font-weight: bold; }
        .gauge-container { position: relative; width: 280px; height: 200px; margin: 0 auto; }
        svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #222; stroke-width: 12; stroke-linecap: round; }
        .gauge-progress { fill: none; stroke: var(--primary-color); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 0.1s; }
        .needle { fill: #fff; transform-origin: 100px 100px; transition: 0.1s; }
        .speed-digital { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 50px; font-weight: bold; }
        .speed-box { background: var(--card-bg); padding: 20px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.2); width: 300px; margin: 20px auto; }
        .btn-measure { padding: 10px 25px; background: none; color: var(--primary-color); border: 1px solid var(--primary-color); border-radius: 12px; cursor: pointer; font-size: 16px; margin-bottom: 20px; transition: 0.3s; }
        .btn-measure:hover { background: var(--primary-color); color: black; }
        .auth-fixed { margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        input[type="password"] { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        .btn-connect { padding: 15px; background: var(--primary-color); color: black; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <img src="WVID6_20260220_183511.jpg" alt="عموري" class="profile-img">
    <h1>شبكة أبو عماد ستارلينك</h1>
    <p class="subtitle">كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>
    
    <div class="expiry-box" id="expiry-text">تاريخ انتهاء الاشتراك : جارِ الحساب...</div>

    <div class="speed-box">
        <button class="btn-measure" onclick="runTest()">قياس السرعة الحالية</button>
        <div class="gauge-container">
            <svg viewBox="0 0 200 150">
                <path class="gauge-bg" d="M 40 120 A 75 75 0 1 1 160 120" />
                <path id="progress" class="gauge-progress" d="M 40 120 A 75 75 0 1 1 160 120" />
                <polygon id="needle" class="needle" points="100,95 97,100 100,40 103,100" transform="rotate(-120, 100, 100)" />
            </svg>
            <div class="speed-digital" id="speed-num">0.0</div>
            <div style="color:#666; font-size:12px; margin-top:-10px;">Mbps</div>
        </div>

        <div class="auth-fixed">
            <input type="password" id="pass" placeholder="أدخل الرقم السري">
            <button onclick="login()" class="btn-connect">اتصال الآن</button>
        </div>
    </div>

    <script>
        // كود حساب تاريخ الانتهاء التلقائي (يوم 26 من كل شهر)
        function updateExpiryDate() {
            const now = new Date();
            let month = now.getMonth();
            let year = now.getFullYear();
            
            // إذا وصلنا ليوم 26 أو بعده، يظهر تاريخ الشهر القادم
            if (now.getDate() >= 26) {
                month++;
            }
            
            const expiryDate = new Date(year, month, 26);
            const d = String(expiryDate.getDate()).padStart(2, '0');
            const m = String(expiryDate.getMonth() + 1).padStart(2, '0');
            const y = expiryDate.getFullYear();
            
            document.getElementById('expiry-text').innerText = `تاريخ انتهاء الاشتراك : ${d}-${m}-${y}`;
        }
        updateExpiryDate();

        function runTest() {
            let num = document.getElementById('speed-num'), prog = document.getElementById('progress'), ndl = document.getElementById('needle');
            let hour = new Date().getHours();
            let min, max;

            if (hour >= 5 && hour < 12) { min = 112; max = 150; }
            else if (hour >= 13 && hour < 19) { min = 40; max = 80; }
            else if (hour >= 19 || hour < 5) { min = 25; max = 40; }
            else { min = 80; max = 110; }

            let targetSpeed = min + (Math.random() * (max - min));
            let c = 0;
            let interval = setInterval(() => {
                c++;
                let tempSpeed = targetSpeed + (Math.random() * 6 - 3);
                num.innerText = tempSpeed.toFixed(1);
                let angle = (tempSpeed / 150) * 240 - 120;
                let offset = 440 - (tempSpeed / 150) * 280;
                ndl.setAttribute('transform', `rotate(${angle}, 100, 100)`);
                prog.style.strokeDashoffset = offset;

                if (c >= 30) {
                    clearInterval(interval);
                    num.innerText = targetSpeed.toFixed(1);
                    let finalAngle = (targetSpeed / 150) * 240 - 120;
                    let finalOffset = 440 - (targetSpeed / 150) * 280;
                    ndl.setAttribute('transform', `rotate(${finalAngle}, 100, 100)`);
                    prog.style.strokeDashoffset = finalOffset;
                }
            }, 80);
        }

        function login() {
            let p = document.getElementById('pass').value;
            if (p === "123") {
                alert("تم الاتصال بنجاح نورت الشبكة");
                window.location.href = "http://google.com";
            } else {
                alert("الرقم السري غلط يا بوب");
            }
        }
    </script>
</body>
</html>
