<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد الملكية</title>
    <style>
        :root { --primary-color: #00d4ff; --bg-dark: #0a0a0b; --card-bg: rgba(255, 255, 255, 0.05); }
        body { text-align: center; font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 20px; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); margin-bottom: 20px; }
        h1 { font-size: 26px; color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { font-size: 16px; opacity: 0.8; margin-bottom: 20px; }
        
        .speed-gauge-box { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--primary-color); margin: 20px auto; max-width: 400px; }
        .gauge-val { font-size: 60px; font-weight: bold; color: var(--primary-color); }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: 0.1s; }
        
        .btn-measure { padding: 15px 40px; background: none; color: var(--primary-color); border: 2px solid var(--primary-color); border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 18px; margin-bottom: 20px; }
        
        /* هذا القسم سيظهر تحت العداد مباشرة بعد انتهاء الفحص */
        .auth-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        .speeds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .speed-card { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .speed-card.active { border-color: var(--primary-color); background: var(--primary-color); color: black; }
        
        input[type="password"] { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; text-align: center; box-sizing: border-box; }
        .btn-connect { padding: 15px; background: var(--primary-color); color: black; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <img src="MVIMG_20260220_183511.jpg" alt="عموري" class="profile-img">
    <h1>شبكة أبو عماد ستارلينك</h1>
    <p class="subtitle">كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>

    <button id="measure-btn" class="btn-measure" onclick="runFakeTest()">اضغط لقياس سرعة الإنترنت</button>

    <div class="speed-gauge-box">
        <div id="status-text" style="color:#888; font-size:14px;">جاهز للفحص...</div>
        <div class="gauge-val" id="speed-display">0.0</div>
        <div style="color: #aaa; font-weight: bold;">Mbps</div>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>

        <div id="auth-section" class="auth-section">
            <div class="speeds-grid">
                <div class="speed-card" onclick="sel(this, '30')"><b>30</b><br>Mbps</div>
                <div class="speed-card active" onclick="sel(this, '70')"><b>70</b><br>Mbps</div>
                <div class="speed-card" onclick="sel(this, '100')"><b>100</b><br>Mbps</div>
            </div>
            <input type="password" id="network-pass" placeholder="أدخل الرقم السري">
            <button onclick="login()" class="btn-connect">اتصال الآن</button>
        </div>
    </div>

    <script>
        let selected = "70";
        function sel(el, s) { 
            document.querySelectorAll('.speed-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); selected = s; 
        }

        function runFakeTest() {
            let btn = document.getElementById('measure-btn'),
                v = document.getElementById('speed-display'),
                f = document.getElementById('fill'),
                st = document.getElementById('status-text'),
                auth = document.getElementById('auth-section'),
                c = 0;

            btn.style.display = 'none';
            st.innerText = "جاري الاتصال بأقمار ستارلينك...";
            
            let i = setInterval(() => {
                c += 1;
                v.innerText = (Math.random() * (120 - 76) + 76).toFixed(1);
                f.style.width = c + '%';
                
                if(c >= 100) { 
                    clearInterval(i); 
                    v.innerText = "118.5"; 
                    st.innerText = "جودة الإشارة: خارقة (ستارلينك)";
                    auth.style.display = 'block'; // إظهار خانات الدخول تحت العداد
                }
            }, 40);
        }

        function login() {
            let p = document.getElementById('network-pass').value;
            if (p === "123") { // الرمز السري من ملفك الأصلي
                alert("تم الاتصال بنجاح!");
                window.location.href = "http://google.com";
            } else { alert("الرقم السري غير صحيح"); }
        }
    </script>
</body>
</html>
