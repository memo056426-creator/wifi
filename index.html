<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب عماد عدن العقاري</title>
    <style>
        body { background: #0f172a; color: #fff; text-align: center; padding-top: 100px; font-family: sans-serif; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; font-size: 20px; text-align: center; margin-bottom: 20px; }
        button { padding: 15px 40px; background: #c5a059; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; color: #000; }
    </style>
</head>
<body>
    <h1 style="color:#c5a059;">مكتب عماد عدن العقاري</h1>
    <p>أدخل الرمز لفتح الإنترنت ثم تصفح العقارات</p>
    <input type="password" id="p" placeholder="الرمز السري (123)">
    <br>
    <button onclick="go()">دخول</button>
    <script>
        function go() {
            if(document.getElementById('p').value === "123") {
                alert("نورت المكتب يا بوب");
                window.location.href = "https://emad-aden-realestate.vercel.app";
            } else { alert("الرمز غلط"); }
        }
    </script>
</body>
</html>
