<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب عماد عدن العقاري - دخول الواي فاي</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #1a1a1a;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid var(--gold);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .office-name {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .info {
            font-size: 14px;
            margin-bottom: 30px;
            color: #ccc;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-login {
            background-color: var(--gold);
            color: var(--dark);
        }
        .btn-ads {
            background-color: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">مكتب عماد عدن العقاري</div>
        <div class="office-name">أهلاً بك في شبكة الشيخ صالح</div>
        <div class="info">للحصول على إنترنت سريع ومشاهدة أحدث عروض العقارات في عدن (المنصورة - بير فضل) اضغط أدناه</div>
        
        <a href="https://wa.me/967XXXXXXXXX" class="btn btn-login">طلب كلمة المرور (واتساب)</a>
        <a href="https://saleh-aden.github.io" class="btn btn-ads">تصفح عروض العقارات 2026</a>
        
        <div class="footer">
            جميع الحقوق محفوظة - مكتب عماد عدن العقاري © 2026
        </div>
    </div>
</body>
</html>
