<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتب عماد عدن العقاري</title>
    <style>
        :root { --gold: #c5a059; --dark: #0f172a; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: var(--dark); color: var(--white); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-top: 20px; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--gold); object-fit: cover; box-shadow: 0 0 25px rgba(197, 160, 89, 0.5); margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 26px; margin-bottom: 10px; font-weight: bold; }
        p { font-size: 15px; opacity: 0.9; margin-bottom: 25px; line-height: 1.6; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; text-align: center; font-size: 18px; outline: none; }
        .btn-connect { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .footer-link { margin-top: 25px; display: block; color: var(--gold); text-decoration: none; font-size: 14px; font-weight: bold; border-top: 1px solid rgba(197, 160, 89, 0.3); padding-top: 15px; }
    </style>
</head>
<body>
    <img src="MVIMG_20260220_183511.jpg" alt="عموري" class="profile-img">
    
    <div class="container">
        <h1>مكتب عماد عدن العقاري</h1>
        <p>نرحب بكم في شبكة الشيخ أبو عماد<br>للوصول للإنترنت يرجى إدخال الرمز</p>
        
        <input type="password" id="pass" placeholder="أدخل الرقم السري" autocomplete="off">
        <button onclick="login()" class="btn-connect">دخول للشبكة</button>
        
        <a href="https://emad-aden-realestate.vercel.app" class="footer-link">تصفح أحدث عقارات عدن الآن</a>
    </div>

    <script>
        function login() {
            var p = document.getElementById('pass').value;
            if (p === "123") { // الرمز السري
                alert("تم الاتصال بنجاح! نورت شبكة أبو عماد");
                window.location.href = "https://emad-aden-realestate.vercel.app";
            } else {
                alert("الرمز غلط يا بوب اطلبه من المكتب");
            }
        }
        // منع الاغلاق التلقائي
        window.onbeforeunload = function() { return "سجل دخولك اولاً"; };
    </script>
</body>
</html>
