<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة مكتب عماد عدن العقاري</title>
    <style>
        :root { --gold: #c5a059; --dark: #0f172a; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: var(--dark); color: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 40px 30px; border-radius: 25px; border: 1px solid var(--gold); width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        h1 { color: var(--gold); font-size: 28px; margin-bottom: 15px; font-weight: bold; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px; }
        .msg { font-size: 16px; opacity: 0.9; margin-bottom: 30px; line-height: 1.8; }
        
        /* الزر الإجباري للدخول للموقع */
        .btn-visit { display: block; width: 100%; padding: 18px; background: none; color: var(--gold); border: 2px solid var(--gold); border-radius: 15px; font-weight: bold; text-decoration: none; margin-bottom: 25px; font-size: 18px; cursor: pointer; transition: 0.3s; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(197, 160, 89, 0); } 100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); } }
        
        /* قسم تسجيل الدخول المخفي */
        #login-section { display: none; margin-top: 15px; padding-top: 25px; border-top: 1px dashed rgba(197, 160, 89, 0.4); }
        input[type="password"] { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; text-align: center; font-size: 20px; outline: none; }
        .btn-connect { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    
    <div class="container">
        <h1>مكتب عماد عدن العقاري</h1>
        <p class="msg">أهلاً بكم في شبكة ستارلينك الخاصة بالمكتب<br>للحصول على الإنترنت، يرجى تصفح أحدث عروضنا العقارية أولاً</p>
        
        <a href="https://emad-aden-realestate.vercel.app" class="btn-visit" id="visit-btn" target="_blank" onclick="unlockLogin()">١- اضغط هنا لتصفح العقارات</a>
        
        <div id="login-section">
            <p style="font-size: 14px; color: var(--gold); margin-bottom: 15px;">شكراً لزيارتك.. أدخل الآن رمز الدخول</p>
            <input type="password" id="pass" placeholder="الرقم السري" autocomplete="off">
            <button onclick="checkAndLogin()" class="btn-connect">٢- تفعيل الإنترنت الآن</button>
        </div>
    </div>

    <script>
        function unlockLogin() {
            // إظهار قسم الدخول فور الضغط على رابط المكتب
            setTimeout(function() {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('visit-btn').style.opacity = '0.6';
                document.getElementById('visit-btn').innerText = 'تمت زيارة الموقع';
                document.getElementById('visit-btn').style.animation = 'none';
            }, 1000);
        }

        function checkAndLogin() {
            var p = document.getElementById('pass').value;
            if (p === "123") { // الرمز السري من ملفاتك
                alert("تم تفعيل الخدمة بنجاح! نورت شبكة مكتب عماد عدن");
                window.location.href = "https://emad-aden-realestate.vercel.app";
            } else {
                alert("الرمز غير صحيح.. يرجى مراجعة المكتب");
            }
        }
        
        // منع الإغلاق التلقائي للمتصفح
        window.onbeforeunload = function() { return "يجب تسجيل الدخول للاستخدام"; };
    </script>
</body>
</html>
