<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>بوابة مكتب عماد عدن العقاري</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        .header { background: #c5a059; color: #000; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        iframe { width: 100%; height: calc(100% - 130px); border: none; }
        .footer { background: #1e293b; height: 70px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #c5a059; padding: 10px; }
        input { width: 50%; padding: 12px; border-radius: 8px; border: 1px solid #c5a059; background: #0f172a; color: white; text-align: center; font-size: 18px; margin-left: 10px; }
        button { width: 35%; padding: 12px; background: #c5a059; color: #000; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">مكتب عماد عدن العقاري - بوابة الدخول</div>
    <iframe src="https://emad-aden-realestate.vercel.app"></iframe>
    <div class="footer">
        <input type="password" id="pass" placeholder="الرمز (123)" autocomplete="off">
        <button onclick="check()">دخول</button>
    </div>
    <script>
        function check() {
            if(document.getElementById('pass').value === "123") {
                alert("تم التفعيل بنجاح! نورت المكتب");
                // الرابط اللي يفتح النت ويقفل صفحة الهبوط فوراً
                window.location.href = "http://connectivitycheck.gstatic.com/generate_204";
            } else { alert("الرمز غلط يا بوب"); }
        }
        // سجن المتصفح ومنع الإغلاق
        window.onbeforeunload = function() { return "سجل دخولك أولاً"; };
    </script>
</body>
</html>
