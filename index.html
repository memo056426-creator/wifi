<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة أبو عماد الملكية</title>
    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-dark: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        body { text-align: center; font-family: sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 40px 20px; }
        .profile-img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--primary-color); object-fit: cover; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); margin-bottom: 20px; }
        h1 { font-size: 28px; color: var(--primary-color); margin-bottom: 5px; }
        .subtitle { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }
        .section-title { font-size: 22px; margin: 40px 0 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .section-title::before, .section-title::after { content: ""; height: 2px; width: 50px; background: var(--primary-color); }
        .speeds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 500px; margin: 0 auto; }
        .speed-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px 10px; cursor: pointer; transition: 0.3s; }
        .speed-card.active { border-color: var(--primary-color); background: var(--primary-color); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); color: black; }
        .speed-card.active .speed-value, .speed-card.active .speed-unit { color: black !important; }
        .speed-value { font-size: 32px; font-weight: 900; display: block; color: var(--primary-color); }
        .btn { padding: 15px 60px; background: var(--primary-color); color: black; border-radius: 50px; font-weight: bold; font-size: 20px; border: none; cursor: pointer; margin-top: 40px; }
        #speed-test { display: none; margin-top: 30px; }
        .gauge { font-size: 50px; font-weight: bold; color: var(--primary-color); }
        .progress-bar { width: 100%; max-width: 400px; height: 10px; background: #222; border-radius: 5px; margin: 20px auto; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; }
    </style>
</head>
<body>
    <img src="MVIMG_20260220_183511.jpg" alt="عموري" class="profile-img">
    
    <div id="main-ui">
        <h1>شبكة أبو عماد ستارلينك</h1>
        <p class="subtitle">كلنا نحب عموري.. اذكر الله واستمتع بالنت</p>
        <div class="section-title">اختار سرعتك</div>
        <div class="speeds-grid">
            <div class="speed-card" onclick="selectSpeed(this, '30')"><span class="speed-value">30</span><span class="speed-unit">Mbps</span></div>
            <div class="speed-card active" onclick="selectSpeed(this, '70')"><span class="speed-value">70</span><span class="speed-unit">Mbps</span></div>
            <div class="speed-card" onclick="selectSpeed(this, '100')"><span class="speed-value">100</span><span class="speed-unit">Mbps</span></div>
        </div>
        <button onclick="checkPassword()" class="btn">اتصال الآن</button>
    </div>

    <div id="speed-test">
        <h2 style="color: var(--primary-color);">جاري الاتصال بسيرفرات ستارلينك...</h2>
        <div class="gauge" id="speed-val">0.0</div>
        <div style="color: #aaa;">Mbps</div>
        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <p id="status-text">يتم الآن فحص جودة الإشارة...</p>
    </div>

    <script>
        let selectedSpeed = "70";
        function selectSpeed(el, s) {
            document.querySelectorAll('.speed-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedSpeed = s;
        }

        function checkPassword() {
            let pass = prompt("ادخل الرقم السري لدخول شبكة أبو عماد بقوة " + selectedSpeed + " ميجا:");
            if (pass === "123") { 
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('speed-test').style.display = 'block';
                runFakeTest();
            } else if (pass !== null) {
                alert("الرقم غلط يا وحش اطلب السر من أبو عماد");
            }
        }

        function runFakeTest() {
            let val = document.getElementById('speed-val');
            let fill = document.getElementById('p-fill');
            let stat = document.getElementById('status-text');
            let count = 0;
            let interval = setInterval(() => {
                count += 1;
                // السرعة الوهمية بين 76 و 120 كما طلبت
                let fake = (Math.random() * (120 - 76) + 76).toFixed(1);
                val.innerText = fake;
                fill.style.width = count + '%';
                if(count >= 100) {
                    clearInterval(interval);
                    val.innerText = "114.8";
                    stat.innerText = "تم تفعيل سرعة " + selectedSpeed + " ميجا بنجاح!";
                    setTimeout(() => { window.location.href = "http://google.com"; }, 2000);
                }
            }, 50);
        }
    </script>
</body>
</html>
